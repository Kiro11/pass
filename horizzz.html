<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PASSORDER</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="pass.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="logo-pill">
      <div class="logo-dot"></div>
      PASSORDER
    </div>
    <h1>GENERATE <span>secure</span> passwords</h1>
    <p class="subtitle">Strong, random, and ready to copy — instantly.</p>
  </header>

  <!-- ── MAIN ── -->
  <main>

    <!-- Generator Card -->
    <div class="card">

      <!-- Password Display -->
      <div class="pwd-wrapper">
        <div class="pwd-box hidden-pwd" id="pwdBox">••••••••••••••••</div>

        <div class="pwd-actions">
          <!-- Copy -->
          <button class="icon-btn" id="copyBtn" title="Copy password" aria-label="Copy password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </button>

          <!-- Show / Hide -->
          <button class="icon-btn" id="eyeBtn" title="Show or hide password" aria-label="Show or hide password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>

          <!-- Regenerate (small icon) -->
          <button class="icon-btn" id="regenIconBtn" title="Regenerate" aria-label="Regenerate password">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Strength Meter -->
      <div class="strength-area">
        <div class="strength-track">
          <div class="strength-fill" id="strengthFill"></div>
        </div>

        <div class="strength-info">
          <span id="entropyLabel">-</span>
          <span class="strength-badge" id="strengthBadge">-</span>
        </div>
      </div>

      <!-- Length Slider -->
      <div class="section-label">Length</div>
      <div class="slider-row">
        <input type="range" id="lenSlider" min="4" max="64" value="16" step="1" />
        <span class="len-badge" id="lenBadge">16</span>
      </div>

      <!-- Character Options -->
      <div class="section-label">Characters</div>
      <div class="toggles-grid" id="togglesGrid">

        <label class="toggle-item active" data-key="upper">
          <input type="checkbox" id="chkUpper" checked />
          <span class="toggle-text">Uppercase A-Z</span>
        </label>

        <label class="toggle-item active" data-key="lower">
          <input type="checkbox" id="chkLower" checked />
          <span class="toggle-text">Lowercase a-z</span>
        </label>

        <label class="toggle-item active" data-key="nums">
          <input type="checkbox" id="chkNums" checked />
          <span class="toggle-text">Numbers 0-9</span>
        </label>

        <label class="toggle-item active" data-key="symbols">
          <input type="checkbox" id="chkSymbols" checked />
          <span class="toggle-text">Symbols !@#$</span>
        </label>

        <label class="toggle-item" data-key="exclude">
          <input type="checkbox" id="chkExclude" />
          <span class="toggle-text">Exclude Similar
            <br><small>O, 0, l, I, 1</small>
          </span>
        </label>

        <label class="toggle-item" data-key="norepeat">
          <input type="checkbox" id="chkNoRepeat" />
          <span class="toggle-text">No repeating characters</span>
        </label>
      </div>

      <!-- Generate Button -->
      <button class="regen-btn" id="regenBtn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
        Generate password
      </button>
    </div>
    <!-- /Generator Card -->

    <!-- History Card -->
    <div class="history-card">
      <div class="history-header">
        <span class="history-title">Recent passwords</span>
        <button class="clear-btn" id="clearBtn">Clear all</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-history" id="emptyMsg">NO PASSWORDS GENERATED YET</div>
      </div>
    </div>
    <!-- /History Card -->








  </main>

  <!-- FOOTER -->
  <footer>PASSORDER — PASSWORDS ARE GENERATED LOCALLY AND NEVER STORED EXTERNALLY</footer>







  <!-- TOAST -->
  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span>Password copied!</span>
  </div>

  <!-- Script -->
  <script src="app.js"></script>
</body>
</html>
