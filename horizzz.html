<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8" />
       <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PASSORDER</title>

  <!--Google Fonts-->
    <link rel="preconnect"
     href="https://fonts.googleapis.com" />
        <link rel="preconnect"
 href="https://fonts.gstatic.com" crossorigin />
   <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk
   :wght@400;500;600;700&family
   =JetBrains+Mono:wght@400;500&display=swap"
rel="stylesheet" />

 <!-- Styles -->
   <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ── HEADER ── -->
 <header>
   <div class="logo-pill">
   <div class="logo-dot"></div>
   PASSORDER
   </div>
   <h1>GENERATE <span>secure</span>
passwords</h1>
  <p class="subtitle">Strong, random, and ready to copy _ instantly.</p>
 </header>
  <!-- ── MAIN ── -->
    <main>

       <!-- Generator Card -->
<div class="card">

 <!-- Password Display -->
   <div class="pwd-wrapper"></div>
         <div class="pwd-box hidden-pwd" id="pwd-box">
••••••••••••••••</div>
      <div class="pwd-actions">

<!-- Show / Hide -->
 <button class="icon-btn" id="eyebtn" title="Show or hide password">
         <svg width="18"
         height="18" viewBox="0 0 24 24" fill="none"
          
         stroke="currentColor" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9"
              width="13" height="13" rx="2"
        ry="2"/>
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
  </svg>
</button>
      <!-- Regenerate (small icon) -->
          <button class="icon-btn" id="regenIconbtn"
title="Regenerate" aria-label="Regenerate password">
      <svg width="17" height="17" viewbox=" 0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="3"
stroke-linecap="round" stroke-linejoin="round">
        <poly line points="23 4 23 10 17"/>
        path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
      </svg>
          </button>


      </div>
</div>

 <!-- Strength Meter -->
    <div class="strength-area">
      <div class="strength-track">
         <div class="strength-fill" id="strength-fill"></div>
      </div>
      </div>

 <div class="strength-info">
   <span id="entropyLabel">-</span>
  <span class="strength-badge" id="strengthBadge">-</span>
  


 </div>

 </div>
  <!-- Length Slider -->
      <div class="section-label"> Length </div>
    <div class="slider-row">
        <span class="slider-label">64</span>
                <span class="len-badge" id="lenBadge">64</span>
    </div>

  

      <!-- Character Options -->
         <div class="section-label">Characters</div>
<div class="toggles-grid" id="togglesGrid">

     <label class="toggle-item active" data-key="upper">
     <input type="checkbox" id="chkUpper" checked />
  <span class="toggle-text">Uppercase A-Z</span>
     </label>
 <label class="toggle-item active" data-key="lower">
       <input type="checkbox" id="chkLower" checked/>
             <span class="toggle-text">Lowercase a-z</span>
 </label>
       <label class="toggle-item active" data-key="nums">
          <input type="checkbox" id="chkNums" checked />
       <span class="toggle-text"
       </label>








        </main>


















</body>


































</html>
